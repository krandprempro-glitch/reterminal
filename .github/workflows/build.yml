name: Build ReTerminal APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK (Fdroid)
      uses: actions/upload-artifact@v4
      with:
        name: reterminal-fdroid-apk
        path: app/build/outputs/apk/fdroid/debug/*.apk
    
    - name: Upload APK (PlayStore)
      uses: actions/upload-artifact@v4
      with:
        name: reterminal-playstore-apk
        path: app/build/outputs/apk/playStore/debug/*.apk
